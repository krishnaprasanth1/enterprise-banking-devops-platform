apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-api
  namespace: banking
  labels:
    app: banking-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banking-api
  template:
    metadata:
      labels:
        app: banking-api
    spec:
      containers:
        - name: banking-api
          image: your-aws-account-id.dkr.ecr.us-east-1.amazonaws.com/enterprise-banking-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: banking-api-config
            - secretRef:
                name: banking-api-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
